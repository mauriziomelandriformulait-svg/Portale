<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DUE Maps</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8fafc; color: #1e293b; margin: 0; padding: 40px; }
        .container { max-width: 1000px; margin: 0 auto; }
        
        /* Stile Titolo */
        .header-container { text-align: center; margin-bottom: 50px; display: flex; align-items: center; justify-content: center; gap: 15px; }
        h1 { color: #0f172a; margin: 0; font-size: 36px; }
        .title-yellow { color: #FFB81C; } /* Giallo Pantone 1235C */
        .map-icon-header { font-size: 36px; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 25px; }
        
        .map-card { 
            background: white; 
            border: 1px solid #cbd5e1; 
            border-radius: 12px; 
            padding: 30px 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 15px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); 
            transition: transform 0.2s, box-shadow 0.2s; 
            border-top: 6px solid #FFB81C; 
            cursor: pointer;
            text-decoration: none;
            color: #1e293b;
        }
        
        .map-card:hover { transform: translateY(-5px); box-shadow: 0 10px 15px rgba(0,0,0,0.1); border-color: #eab308; }
        
        .icon { font-size: 40px; }
        .label { font-size: 16px; font-weight: 600; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-container">
        <h1><span class="title-yellow">DUE</span></h1>
        <span class="map-icon-header">🗺️</span>
    </div>
    
    <div class="grid">
        <div class="map-card" onclick="inviaMessaggioNavigazione('#')"><span class="icon">🤝</span><span class="label">CRM</span></div>
        <div class="map-card" onclick="inviaMessaggioNavigazione('#')"><span class="icon">📊</span><span class="label">AFC</span></div>
        <div class="map-card" onclick="inviaMessaggioNavigazione('#')"><span class="icon">🛒</span><span class="label">Procurement</span></div>
        
        <div class="map-card" onclick="inviaMessaggioNavigazione('https://diapdemo.formula.it:8282/due/#/home/desktop/MA%20-%20Order-to-cash')">
            <span class="icon">📢</span><span class="label">Vendite</span>
        </div>
        
        <div class="map-card" onclick="inviaMessaggioNavigazione('#')"><span class="icon">⚙️</span><span class="label">Produzione</span></div>
        <div class="map-card" onclick="inviaMessaggioNavigazione('#')"><span class="icon">📦</span><span class="label">Magazzino</span></div>
        
        <div class="map-card" onclick="inviaMessaggioNavigazione('https://diapdemo.formula.it:8282/due/#/home/desktop/MA%20-%20Analysis')">
            <span class="icon">📈</span><span class="label">Analysis</span>
        </div>

        <a class="map-card" href="https://arxivargrp.formula.it/arxivarnextwebportal/Account/Login" target="_blank">
            <span class="icon">📁</span><span class="label">Documentale</span>
        </a>

        <div class="map-card" onclick="inviaMessaggioNavigazione('#')"><span class="icon">🔧</span><span class="label">Settings</span></div>
        
        <div class="map-card" onclick="inviaMessaggioNavigazione('https://diapdemo.formula.it:8282/due/#/home/desktop/MP%20-%20System%20Health')">
            <span class="icon">🏥</span><span class="label">System Health</span>
        </div>
    </div>
</div>

<script>
    function inviaMessaggioNavigazione(percorsoTarget) {
        if(percorsoTarget === '#') return;
        let routePath = percorsoTarget.includes('#') ? percorsoTarget.split('#')[1] : percorsoTarget;
        const payload = { type: 'ROUTER_NAVIGATION', action: 'navigate', url: percorsoTarget, route: routePath };
        window.parent.postMessage(payload, '*');
    }
</script>

</body>
</html>
