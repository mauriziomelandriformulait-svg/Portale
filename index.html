<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DUE Maps</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8fafc; color: #1e293b; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        
        /* Griglia fissa a 4 colonne per mantenere l'allineamento */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 20px; 
        }
        
        @media (max-width: 850px) { .grid { grid-template-columns: repeat(2, 1fr); } }
        
        .map-card { 
            background: white; 
            border: 1px solid #cbd5e1; 
            border-radius: 12px; 
            padding: 25px 15px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 12px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); 
            transition: transform 0.2s, box-shadow 0.2s; 
            border-top: 6px solid #FFCC00;
            cursor: pointer;
            text-decoration: none;
            color: #1e293b;
        }
        
        .map-card:hover { transform: translateY(-5px); box-shadow: 0 10px 15px rgba(0,0,0,0.1); border-color: #eab308; }
        
        .icon { font-size: 32px; width: 32px; height: 32px; fill: none; stroke: currentColor; stroke-width: 1.5; }
        .label { font-size: 14px; font-weight: 600; text-align: center; }
    </style>
</head>

<script>
    function inviaMessaggioNavigazione(percorsoTarget) {
        if(percorsoTarget === '#') return;
        let routePath = percorsoTarget.includes('#') ? percorsoTarget.split('#')[1] : percorsoTarget;
        const payload = { type: 'ROUTER_NAVIGATION', action: 'navigate', url: percorsoTarget, route: routePath };
        window.parent.postMessage(payload, '*');
    }
</script>
